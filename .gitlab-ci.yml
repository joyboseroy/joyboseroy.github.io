image: alpine:latest

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp *.html *.pdf *.ico *.jpg *.xml *.txt *.png public/ 2>/dev/null || true
    - cp favicon.ico robots.txt public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
